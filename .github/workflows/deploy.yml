name: Deploy to VPS

on:
    push:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:

            - name: 1.Checkout code
              uses: actions/checkout@v4

            - name: 2.Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: 3.Build and push Web image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: Dockerfile.web
                push: true
                tags: |
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}/web:latest
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}

            - name: 4.Build and push migrate image
              uses: docker/build-push-action@v5
              with: 
                context: .
                file: Dockerfile.migrate
                push: true
                tags: |
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/migrate:latest
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/migrate:${{ github.sha }}

            - name: 5.Connnect to VPS
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USERNAME }}
                key: ${{ secrets.VPS_SSH_KEY }}
                script: | 
                  echo ${{ secrets.DOCKER_PULL_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

                  cd /var/www/Cyastral_Wiki

                  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
                  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/migrate:latest

                  docker compose down || true
                  docker compose -f docker-compose.yml up -d

                  sleep 30
                  docker compose ps

                  docker image prune -f