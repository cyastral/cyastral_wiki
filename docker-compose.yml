version: "3.9"
services:

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: sakuramiku39
      POSTGRES_DB: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment: 
        DATABASE_URL: "postgresql://user:sakuramiku39@db:5432/db"
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      migrate:
          condition: service_completed_successfully

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      
volumes:
  pgdata: