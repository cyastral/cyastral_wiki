version: "3.9"

env_file:
  - .env.production

services:

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: ghcr.io/Astesola/cyastral_wiki/migrate:latest
    environment: 
        DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  web:
    image: ghcr.io/Astesola/cyastral_wiki/web:latest
    ports:
      - "3000:3000"
    depends_on:
      migrate:
          condition: service_completed_successfully

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      
volumes:
  pgdata: